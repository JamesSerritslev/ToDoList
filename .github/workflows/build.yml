name: Build releases

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate icons
        run: npm run generate-icon

      - name: Build Windows
        if: runner.os == 'Windows'
        run: npm run build:win
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Build macOS
        if: runner.os == 'macOS'
        run: npm run build:mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Build Linux
        if: runner.os == 'Linux'
        run: npm run build:linux
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: List build output
        shell: bash
        run: |
          echo "dist contents:"
          ls -la dist || true
          find dist -maxdepth 1 -type f \( -name '*.exe' -o -name '*.dmg' -o -name '*.AppImage' -o -name '*.deb' \) -print

      - name: Upload Windows artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: Projects-windows
          path: dist/Projects-Portable.exe
          if-no-files-found: error

      - name: Upload macOS artifacts
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: Projects-macos
          path: dist/*.dmg
          if-no-files-found: error

      - name: Prepare Linux artifacts
        if: runner.os == 'Linux'
        shell: bash
        run: |
          mkdir -p release-assets
          echo "dist contents:"
          ls -la dist
          appimage=$(find dist -maxdepth 1 -type f \( -name '*.AppImage' -o -name '*.appimage' \) | head -n 1)
          deb=$(find dist -maxdepth 1 -type f -name '*.deb' | head -n 1)
          if [ -z "$appimage" ] || [ -z "$deb" ]; then
            echo "Could not find Linux .AppImage and .deb in dist/"
            exit 1
          fi
          cp "$appimage" release-assets/Projects-linux.AppImage
          cp "$deb" release-assets/Projects-linux.deb
          ls -la release-assets

      - name: Upload Linux artifacts
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: Projects-linux
          path: release-assets/
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
